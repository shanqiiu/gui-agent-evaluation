[ProjectConfig]
mode=test

# OpenAI-compatible chat completions endpoints.
# For local vLLM served by model/inference.py, point both URLs to /v1/chat/completions
# and leave *_api_key_env empty if the server does not require auth.
[MLLMConfig]
llm_model_name=qwen36-27b-vl
llm_model_url=http://mlops.huawei.com/mlops-service/api/v2/agentService/v1/chat/completions
vlm_model_name=qwen36-27b-vl
vlm_model_url=http://mlops.huawei.com/mlops-service/api/v2/agentService/v1/chat/completions
llm_api_key=
vlm_api_key=
include_top_k=true
request_timeout=120

[EvalConfig]
benchmark_dir=D:\benchmark\Benchmark_100
sliding_mode=MIX
output_suffix=bench0904_eval0925
eval_output_dir=D:\benchmark\Benchmark_100_results\0925_mix
max_workers=25
max_samples=-1

[MLLMDataCollectorConfig]
enable_log=false
collected_data_root_dir = /
llm_saved_folder_suffix = bench_eval_request_log_0917
vlm_saved_folder_suffix = bench_eval_request_log_0917
