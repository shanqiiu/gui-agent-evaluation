[ProjectConfig]
mode=production

# OpenAI-compatible chat completions endpoints.
# Local vLLM example:
#   python model/inference.py --serve --host 0.0.0.0 --port 8000 --tp 1
#   llm_model_url=http://127.0.0.1:8000/v1/chat/completions
#   vlm_model_url=http://127.0.0.1:8000/v1/chat/completions
#   llm_model_name=<model path or served model name>
#   vlm_model_name=<model path or served model name>
#   llm_api_key_env=
#   vlm_api_key_env=
[MLLMConfig]
llm_model_name=Qwen3-VL-235B-A22B-Instruct
llm_model_url=http://aitest-beta.rnd.huawei.com/v1/chat/completions
vlm_model_name=Qwen3-VL-235B-A22B-Instruct
vlm_model_url=http://aitest-beta.rnd.huawei.com/v1/chat/completions
llm_api_key=
vlm_api_key=
llm_api_key_env=MLOPS_API_KEY
vlm_api_key_env=MLOPS_API_KEY
include_top_k=true
request_timeout=120

[EvalConfig]
sliding_mode=LLM
